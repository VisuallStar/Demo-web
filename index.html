<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Projects</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 3rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            transform: scaleX(0);
            transition: transform 0.3s ease;
            transform-origin: left;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            border-color: #475569;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .card h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card p {
            color: #94a3b8;
            margin: 0;
            line-height: 1.5;
        }

        .btn {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background-color: var(--accent);
            color: white;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .card:hover .btn {
            background-color: var(--accent-hover);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Web Projects</h1>
        <p class="subtitle">Explore my latest front-end creations and animations.</p>

        <div class="grid">
            <a href="scroll-animation/index.html" class="card">
                <div class="icon">✨</div>
                <h2>Scroll Animation</h2>
                <p>A beautiful vanilla HTML/CSS/JS experience with smooth scroll animations.</p>
                <div class="btn">View Project</div>
            </a>

            <a href="hammer/dist/index.html" class="card">
                <div class="icon">⚛️</div>
                <h2>Hammer App</h2>
                <p>A dynamic, interactive React application built with Vite and TailwindCSS.</p>
                <div class="btn">View Project</div>
            </a>
        </div>
    </div>
</body>
</html>
